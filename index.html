<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="stylesheet" href="styles.css">
        <script src="main.js" defer></script>

        <title>Expense Calculator</title>

    </head>
    <body>

        <!---------------------------------------- Add/display transactions Tab ------------------------------------------->
        <div id="tab-add" class="tab active">
            <div class="tracker section">
                <div class="container">

                    <h1>Expense Tracker</h1>

                    <form id="transaction-form">

                        <!-- Type -->
                        <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" name="type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                        </div>

                        <!-- Amount -->
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" />
                        </div>
                        <div id="amount-error" class="error-message"></div>

                        <!-- Category (only really matters for expenses) -->
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category">
                                <option value="general">General</option>
                                <option value="bills">Bills</option>
                                <option value="entertainment">Entertainment</option>
                                <option value="travel">Travel</option>
                                <option value="food">Food</option>
                                <option value="once_off">Once-off</option>
                            </select>
                        </div>

                        <!-- Description -->
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" name="description" placeholder="e.g. Tesco groceries" />
                        </div>

                        <div id="description-error" class="error-message"></div>

                        <!-- Submit -->
                        <button id="add-trans-btn" class="main-btn" type="button">Add Transaction</button>
                    </form>

                </div>
            </div>

            <div class="section">
                <div class="container">
                    <h2 class="secondary-heading">List of Transactions</h2>
                    <div class="display" id="display"></div>
                </div>
            </div>
        </div>

        <!------------------------------------------ Analytics Tab ----------------------------------------------------->
        <div id="tab-analytics" class="tab">

        </div>

        <!------------------------------------------- Calculator Tab --------------------------------------------------->
        <div id="tab-calculator" class="tab">
            
        </div>
    </body>
</html>
