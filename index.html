<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="stylesheet" href="styles.css">
        <script src="main.js" defer></script>

        <title>Expense Calculator</title>

    </head>
    <body>

        <!---------------------------------------- Add/display transactions Tab ------------------------------------------->
        <div id="tab-add" class="tab active">
            <div class="tracker section">
                <div class="container">

                    <h1>Expense Tracker</h1>

                    <form id="transaction-form">

                        <!-- Type -->
                        <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" name="type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                        </div>

                        <!-- Amount -->
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" />
                        </div>
                        <div id="amount-error" class="error-message"></div>

                        <!-- Category (only really matters for expenses) -->
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category">
                                <option value="general">General</option>
                                <option value="bills">Bills</option>
                                <option value="entertainment">Entertainment</option>
                                <option value="travel">Travel</option>
                                <option value="food">Food</option>
                                <option value="once_off">Once-off</option>
                            </select>
                        </div>

                        <!-- Description -->
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" name="description" placeholder="e.g. Tesco groceries" />
                        </div>

                        <div id="description-error" class="error-message"></div>

                        <!-- Submit -->
                        <button id="add-trans-btn" class="main-btn" type="button">Add Transaction</button>
                    </form>

                </div>
            </div>

            <div class="section">
                <div class="container">
                    <h2 class="secondary-heading">List of Transactions</h2>
                    <div class="display" id="display"></div>
                </div>
            </div>
        </div>

        <!------------------------------------------ Analytics Tab ----------------------------------------------------->
        <div id="tab-analytics" class="tab">

            <div class="section">
                <div class="container">

                    <h1>Analytics</h1>

                    <!-- HERO BALANCE -->
                    <div class="analytics-hero">
                        <p class="sub-text">Balance This Month</p>
                        <h2 id="analytics-balance">€0.00</h2>
                    </div>

                    <div class="monthly-summary">
                        <p id="month-label"></p>
                    </div>

                    <!-- INCOME / EXPENSE CARDS -->
                    <div class="analytics-grid">

                        <div class="analytics-card income">
                            <p class="label">Income</p>
                            <h2 id="analytics-total-income">€0.00</h2>
                        </div>

                        <div class="analytics-card expense">
                            <p class="label">Expenses</p>
                            <h2 id="analytics-total-expense">€0.00</h2>
                        </div>

                    </div>

                    <!-- CATEGORY BREAKDOWN -->
                    <h3 class="analytics-title">Spending by Category</h3>
                    <div id="category-breakdown" class="category-breakdown"></div>

                    <div class="donut-chart">
                        <canvas id="donutChart" width="200" height="200"></canvas>

                        <div id="chart-legend" class="chart-legend"></div>
                    </div>
                    

                </div>
            </div>

        </div>

        <!------------------------------------------- Calculator Tab --------------------------------------------------->
        <div id="tab-calculator" class="tab">

            <div class="section">
                <div class="container">

                    <h1>Gross → Net Calculator</h1>

                    <div class="form-group">
                        <label>Gross Income</label>
                        <input type="number" id="gross-income" placeholder="e.g. 50000">
                    </div>

                    <div class="btn-wrapper">
                        <button class="main-btn" onclick="renderCalculator()">
                            Calculate
                        </button>
                    </div>

                    <div id="calc-result" style="margin-top:2rem;"></div>

                </div>
            </div>

        </div>

                <span>Add</span>
            </button>
